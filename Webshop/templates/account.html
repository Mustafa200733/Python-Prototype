{% extends "base.html" %}


{% block content %}
  <h1 class="page-title">Mijn Account</h1>

  <div class="form-container">
    {% if message %}
    <p class="success-message">{{ message }}</p>
    {% endif %}

    <form action="/account" method="POST">
      <label for="username">Gebruikersnaam</label>
      <input type="text" id="username" name="username" value="{{ user }}" required />

      <label for="password">Wachtwoord</label>
      <div class="password-row">
        <input type="password" id="password" name="password" value="{{ password }}" required />
        <button type="button" class="btn-toggle" id="togglePassword" aria-label="Toon wachtwoord">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>

      <button type="submit" class="btn-blue">Gegevens opslaan</button>
    </form>
  </div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const passwordInput = document.getElementById("password");
    const toggleButton = document.getElementById("togglePassword");

    toggleButton.addEventListener("click", function () {
      const visible = passwordInput.type === "text";
      passwordInput.type = visible ? "password" : "text";
      toggleButton.innerHTML = visible
        ? '<i class="fa-solid fa-eye"></i>'
        : '<i class="fa-solid fa-eye-slash"></i>';
      toggleButton.setAttribute(
        "aria-label",
        visible ? "Toon wachtwoord" : "Verberg wachtwoord"
      );
    });
  });
</script>

{% endblock %}

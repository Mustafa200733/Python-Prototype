{% extends "base.html" %}

<!--
- Formulier toont huidige username & password
- POST → verstuurt nieuwe gegevens naar /account
- Als gegevens aangepast → toont succesmelding
-->

{% block content %}


  <h1 class="page-title">Mijn Account</h1>


  <div class="form-container">

    {% if message %}

    <p class="success-message">{{ message }}</p>

    {% endif %}

    <form action="/account" method="POST">

      <label for="username">Gebruikersnaam</label>

      <input type="text" id="username" name="username" value="{{ user }}" required />

      <label for="password">Wachtwoord</label>

      <input type="password" id="password" name="password" value="{{ password }}" required />

      <button type="submit" class="btn-blue">Gegevens opslaan</button>

    </form>

  </div>

<!-- Einde content -->
{% endblock %}

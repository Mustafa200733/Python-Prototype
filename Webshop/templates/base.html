<!-- base.html: de basis-layout voor alle pagina's -->

<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webshop Prototype</title>

    <!-- Koppelt het CSS-bestand uit de static-map -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <!-- Font Awesome voor iconen -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-left">
        {% if session.get('user') %}
        <a href="/home" class="nav-icon"><i class="fa fa-home"></i> Home</a>
        {% else %}
        <a href="/login" class="nav-icon"><i class="fa fa-home"></i> Home</a>
        {% endif %}
      </div>

      <div class="nav-right">
        {% if session.get('user') %}
        <a href="/contact" class="nav-icon"><i class="fa fa-envelope"></i> Contact</a>
        <a href="/account" class="nav-icon"><i class="fa fa-user"></i> Account</a>
        <a href="/cart" class="nav-icon"><i class="fa fa-shopping-cart"></i> Winkelwagen</a>
        <a href="/logout" class="btn-logout">Uitloggen</a>
        {% else %}
        <a href="/login" class="btn-login">Inloggen</a>
        {% endif %}
      </div>
    </nav>

    <!-- PAGINA-INHOUD -->
    <main>
      {% block content %}
      {% endblock %}
    </main>

    <!-- FOOTER -->
    <footer>
      <p>© 2025 Webshop Prototype</p>
    </footer>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='main.js') }}"></script>
  </body>
</html>

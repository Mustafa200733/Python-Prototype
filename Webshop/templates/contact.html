{% extends "base.html" %}
{% block content %}

<h1 class="page-title">Contact</h1>

{% if message_sent %}
<div id="successPopup" class="success-popup">
  <p>Bericht is succesvol verstuurd!</p>
</div>
{% endif %}

<section class="contact-layout">
  <article class="contact-card">
    <h2>Neem contact met ons op</h2>
    <p class="contact-intro">
      We helpen je graag. Je kunt ons bereiken via e-mail of telefoon.
    </p>

    <div class="contact-item">
      <span class="contact-label">E-mail</span>
      <a href="mailto:support@webshop.nl">support@webshop.nl</a>
    </div>

    <div class="contact-item">
      <span class="contact-label">Telefoon</span>
      <a href="tel:+31123456789">0123-456789</a>
    </div>
  </article>

  <div class="form-container">
    <form action="/contact" method="POST">
      <label for="name">Naam</label>
      <input type="text" id="name" name="name" required />

      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" required />

      <label for="message">Bericht</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit" class="btn-blue">Verstuur</button>
    </form>
  </div>
</section>

{% endblock %}

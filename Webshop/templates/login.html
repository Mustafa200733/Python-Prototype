<!--
login.html toont een inlogformulier.
- Extends base.html → gebruikt de navbar/footer van base.html
- POST formulier → verstuurt username & password naar /login
- Als gebruiker succesvol inlogt, wordt session['user'] gezet
-->
{% extends "base.html" %}
{% block content %}

<h1 class="page-title">Inloggen</h1>

<div class="form-container">
  <form action="/login" method="POST">
    <label for="username">Gebruikersnaam</label>
    <input type="text" id="username" name="username" required />

    <label for="password">Wachtwoord</label>
    <input type="password" id="password" name="password" required />

    <button type="submit" class="btn-blue">Inloggen</button>
  </form>
</div>

{% endblock %}

<!--
home.html laat alle producten zien
- Extends base.html
- Loop door producten uit database
- Voor elk product: naam, prijs en “Toevoegen aan winkelwagen” knop
- De knop wordt met JavaScript interactive gemaakt (meldingen)
-->
{% extends "base.html" %}
{% block content %}

<h1 class="page-title">Producten</h1>

<div class="product-grid">
  {% for product in products %}
  <div class="product-card">
    <h2>{{ product[1] }}</h2>
    <p class="price">€{{ "%.2f"|format(product[2]) }}</p>

    <form action="/add_to_cart/{{ product[0] }}" method="GET">
      <button type="button" class="btn">Toevoegen aan winkelwagen</button>
    </form>
  </div>
  {% endfor %}
</div>

{% endblock %}
